# docker-compose.yml — Zephyr project template
#
# Usage:
#   docker compose run --rm zephyr    # Interactive shell with west access
#   docker compose run --rm renode    # Build firmware and run on simulated FRDM-MCXN947
#
# The renode service streams LED state changes to stdout. Ctrl+C to exit.

x-common: &common
  image: ghcr.io/jacobbeningo/zephyr-base:v4.4.0
  # Renode 1.16.1 is x86_64 Linux only. Pinning the platform here makes the
  # build and emulator behave identically on Apple Silicon (Rosetta 2) and
  # native x86_64 hosts.
  platform: linux/amd64
  volumes:
    # App source and build/ output both land on the host so VS Code can open
    # the compile_commands.json and zephyr.elf for IntelliSense and debugging.
    - .:/workdir/app
    # Persist ccache across runs for faster incremental builds
    - ccache:/home/zephyr/.ccache
  working_dir: /workdir/app
  environment:
    - CCACHE_DIR=/home/zephyr/.ccache
  stdin_open: true
  tty: true

services:
  # Interactive shell with full west access
  zephyr:
    <<: *common

  # Build firmware and run on simulated FRDM-MCXN947.
  # LED state changes appear on stdout. Ctrl+C to stop.
  renode:
    <<: *common
    command: >
      bash -c "west build -b frdm_mcxn947/mcxn947/cpu0 /workdir/app -d /workdir/app/build &&
               renode --console --disable-xwt renode/scripts/frdm_mcxn947_zephyr.resc"

volumes:
  ccache:
