name: Build SDK Image

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "Zephyr SDK version (e.g. 1.0.1)"
        required: true
        default: "1.0.1"
      sdk_sha256_amd64:
        description: "SHA-256 of linux-x86_64 minimal tarball"
        required: false
        default: ""
      sdk_sha256_arm64:
        description: "SHA-256 of linux-aarch64 minimal tarball"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io/jacobbeningo

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SDK image
        uses: docker/build-push-action@v6
        with:
          context: sdk/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/zephyr-sdk:${{ inputs.sdk_version }}
            ${{ env.REGISTRY }}/zephyr-sdk:latest
          build-args: |
            SDK_VERSION=${{ inputs.sdk_version }}
            SDK_SHA256_AMD64=${{ inputs.sdk_sha256_amd64 }}
            SDK_SHA256_ARM64=${{ inputs.sdk_sha256_arm64 }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/zephyr-sdk:${{ inputs.sdk_version }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/zephyr-sdk:${{ inputs.sdk_version }}-cache,mode=max
