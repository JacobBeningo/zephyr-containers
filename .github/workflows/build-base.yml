name: Build Base Image

on:
  workflow_dispatch:
    inputs:
      zephyr_version:
        description: "Zephyr version tag (e.g. v4.4.0)"
        required: true
        default: "v4.4.0"
      sdk_version:
        description: "SDK image version to build from"
        required: true
        default: "1.0.1"
      run_smoke_test:
        description: "Run west build smoke test during image build"
        type: boolean
        default: false
  schedule:
    # Monthly rebuild on the 1st at 02:00 UTC
    - cron: "0 2 1 * *"

env:
  REGISTRY: ghcr.io/jacobbeningo
  DEFAULT_ZEPHYR_VERSION: v4.4.0
  DEFAULT_SDK_VERSION: "1.0.1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          echo "zephyr=${{ inputs.zephyr_version || env.DEFAULT_ZEPHYR_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "sdk=${{ inputs.sdk_version || env.DEFAULT_SDK_VERSION }}" >> "$GITHUB_OUTPUT"
          echo "smoke=${{ inputs.run_smoke_test || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: base/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/zephyr-base:${{ steps.versions.outputs.zephyr }}
            ${{ env.REGISTRY }}/zephyr-base:latest
          build-args: |
            SDK_VERSION=${{ steps.versions.outputs.sdk }}
            ZEPHYR_VERSION=${{ steps.versions.outputs.zephyr }}
            REGISTRY=${{ env.REGISTRY }}
            RUN_SMOKE_TEST=${{ steps.versions.outputs.smoke == 'true' && '1' || '0' }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/zephyr-base:${{ steps.versions.outputs.zephyr }}-cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/zephyr-base:${{ steps.versions.outputs.zephyr }}-cache,mode=max
